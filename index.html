<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>니가가라투자왕</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="top-panel">
        <div class="title-row">
          <div>
            <p class="eyebrow">Mock League</p>
            <h1>니가가라투자왕</h1>
            <p class="hero-copy">친구들과 1,000만원으로 시작하는 짧고 가벼운 투자 승부.</p>
          </div>
          <img
            class="hero-image"
            alt="모바일 투자 앱 분위기의 도시와 차트"
            src="https://images.unsplash.com/photo-1642543492481-44e81e3914a7?auto=format&fit=crop&w=360&q=80"
          />
        </div>

        <div class="league-card">
          <div>
            <p class="muted">현재 리그</p>
            <h2 id="leagueName">새싹 투자왕 리그</h2>
          </div>
          <span id="leagueStatus" class="status-pill">진행 중</span>
        </div>

        <div class="summary-grid">
          <article>
            <span>초기 자금</span>
            <strong>1,000만원</strong>
          </article>
          <article>
            <span>남은 기간</span>
            <strong id="daysLeft">14일</strong>
          </article>
          <article>
            <span>내 순위</span>
            <strong id="myRank">-</strong>
          </article>
        </div>
      </section>

      <nav class="tab-bar" aria-label="앱 메뉴">
        <button class="tab active" data-view="leagueView">리그</button>
        <button class="tab" data-view="tradeView">투자</button>
        <button class="tab" data-view="rankingView">랭킹</button>
        <button class="tab" data-view="historyView">기록</button>
      </nav>

      <section id="leagueView" class="view active">
        <div class="section-head">
          <div>
            <p class="eyebrow">League Room</p>
            <h2>같은 돈으로 시작하기</h2>
          </div>
        </div>

        <form id="leagueForm" class="form-panel">
          <label>
            리그 이름
            <input id="leagueInput" maxlength="18" value="새싹 투자왕 리그" />
          </label>
          <label>
            종료일
            <input id="endDateInput" type="date" />
          </label>
          <button type="submit">리그 설정 저장</button>
        </form>

        <div class="invite-panel">
          <p>초대 코드</p>
          <div class="invite-code" id="inviteCode">KING-1000</div>
          <a id="inviteLink" class="invite-link" href="#">초대 링크 만들기</a>
          <span>친구는 이 코드로 들어와 1,000만원을 받고 시작합니다.</span>
        </div>

        <form id="joinForm" class="form-panel compact">
          <label>
            참여 닉네임
            <input id="nicknameInput" maxlength="12" placeholder="예: 단타요정" />
          </label>
          <button type="submit">리그 참여</button>
        </form>

        <div id="participants" class="people-list"></div>
      </section>

      <section id="tradeView" class="view">
        <div class="section-head">
          <div>
            <p class="eyebrow">Trading</p>
            <h2>종목 검색과 매수</h2>
          </div>
          <select id="activeUserSelect" aria-label="투자할 참여자"></select>
        </div>

        <div class="wallet-strip">
          <div>
            <span>현금</span>
            <strong id="cashBalance">-</strong>
          </div>
          <div>
            <span>총 자산</span>
            <strong id="totalAsset">-</strong>
          </div>
        </div>

        <div class="search-panel">
          <label>
            종목명 또는 코드
            <input id="stockSearchInput" placeholder="삼성전자, NAVER, 005930" autocomplete="off" />
          </label>
          <div id="selectedStockPanel" class="selected-stock"></div>
        </div>

        <div id="stockList" class="stock-list"></div>

        <form id="buyForm" class="trade-panel">
          <label>
            매수 금액
            <input id="buyAmountInput" inputmode="numeric" value="1000000" />
          </label>
          <button type="submit">선택 종목 매수</button>
        </form>

        <div class="holdings-panel">
          <h3>보유 종목</h3>
          <div id="holdingsList"></div>
        </div>
      </section>

      <section id="rankingView" class="view">
        <div class="section-head">
          <div>
            <p class="eyebrow">Ranking</p>
            <h2>오늘의 투자왕</h2>
          </div>
          <button id="closeLeagueBtn" class="ghost-button">리그 종료</button>
        </div>
        <div id="rankingList" class="ranking-list"></div>
      </section>

      <section id="historyView" class="view">
        <div class="section-head">
          <div>
            <p class="eyebrow">History</p>
            <h2>거래 기록</h2>
          </div>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
